[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "airbnb-scraping-tool"
version = "0.1.0"
description = "Short-Stay Market Scanner"
requires-python = ">=3.10"
dependencies = [
    "playwright>=1.40",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "sqlalchemy>=2.0",
    "click>=8.0",
]

[project.scripts]
scan = "cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
