[project]
name = "airbnb-scraping-tool"
version = "0.1.0"
description = "Short-Stay Market Scanner"
requires-python = ">=3.12"
dependencies = [
    "streamlit>=1.35.0",
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
