[project]
name = "airbnb-scraping-tool"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "streamlit>=1.32.0",
    "sqlalchemy>=2.0.0",
    "pandas>=2.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["db", "dashboard"]
