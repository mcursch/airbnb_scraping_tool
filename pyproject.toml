[project]
name = "airbnb-scraping-tool"
version = "0.1.0"
description = "Short-Stay Market Scanner: scrapes Airbnb and hotel listings, extracts structured data via Claude, and presents results in a Streamlit dashboard."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.44",
    "playwright-stealth>=1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy>=2.0",
    "anthropic>=0.28",
    "streamlit>=1.35",
]

[project.scripts]
scan = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
