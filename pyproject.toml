[project]
name = "airbnb-scraping-tool"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.40",
    "httpx>=0.27",
    "pydantic>=2",
    "sqlalchemy>=2",
    "pydantic-settings>=2",
    "anthropic>=0.40",
    "streamlit>=1.35",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["scrapers"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
