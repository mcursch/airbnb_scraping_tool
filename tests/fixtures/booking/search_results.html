<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amsterdam: Hotels and places to stay | Booking.com</title>
</head>
<body>
  <div id="search_results_wrapper">

    <div data-testid="search-results-count">
      We found <strong>312</strong> properties for your search
    </div>

    <!-- Property 1 -->
    <div data-testid="property-card">
      <div data-testid="title">Hotel V Nesplein</div>
      <a data-testid="title-link" href="/hotel/nl/hotel-v-nesplein.en-gb.html">
        Hotel V Nesplein
      </a>
      <div data-testid="review-score">
        <div class="score">8.7</div>
        <span class="review-word">Excellent</span>
        <span class="review-count">2,341 reviews</span>
      </div>
      <div data-testid="price-and-discounted-price">
        <span class="prco-valign-middle-helper">US$</span>
        <span>162</span>
      </div>
      <div data-testid="property-card-unit-configuration">
        <span>1 double bed</span>
        <span>Breakfast included</span>
      </div>
    </div>

    <!-- Property 2 -->
    <div data-testid="property-card">
      <div data-testid="title">Volkshotel</div>
      <a data-testid="title-link" href="/hotel/nl/volkshotel.en-gb.html">
        Volkshotel
      </a>
      <div data-testid="review-score">
        <div class="score">8.3</div>
        <span class="review-word">Very good</span>
        <span class="review-count">4,102 reviews</span>
      </div>
      <div data-testid="price-and-discounted-price">
        <span class="prco-valign-middle-helper">US$</span>
        <span>148</span>
      </div>
      <div data-testid="property-card-unit-configuration">
        <span>1 queen bed</span>
      </div>
    </div>

    <!-- Property 3 -->
    <div data-testid="property-card">
      <div data-testid="title">Sir Adam Hotel</div>
      <a data-testid="title-link" href="/hotel/nl/sir-adam.en-gb.html">
        Sir Adam Hotel
      </a>
      <div data-testid="review-score">
        <div class="score">9.0</div>
        <span class="review-word">Wonderful</span>
        <span class="review-count">892 reviews</span>
      </div>
      <div data-testid="price-and-discounted-price">
        <span class="prco-valign-middle-helper">US$</span>
        <span>231</span>
      </div>
    </div>

    <!-- No pagination-next on this page (single-page result for test) -->

  </div>
</body>
</html>
